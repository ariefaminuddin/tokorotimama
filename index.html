<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Dapur Roti Mama - Premium Bakery</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --primary: #bf5a27;
            --primary-light: #d86d2e;
            --primary-dark: #a34910;
            --secondary: #fdf5eb;
            --text: #312b23;
            --text-light: #6f5e4f;
            --white: #ffffff;
            --shadow: 0 20px 60px rgba(0,0,0,0.08);
            --shadow-hover: 0 30px 80px rgba(191,90,39,0.15);
            --radius: 24px;
            --transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        body { background:var(--secondary); color:var(--text); font-family:'Inter',sans-serif; }
        a { color:inherit; text-decoration:none; }
        button, input, select, textarea { font-family:'Inter',sans-serif; }

        .navbar { 
            position:sticky; top:0; z-index:1000; 
            background:rgba(255,248,240,0.92);
            backdrop-filter:blur(20px);
            padding:0.8rem 2.5rem; 
            display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:1rem;
            border-bottom:1px solid rgba(191,90,39,0.08);
        }
        .logo { display:flex; align-items:center; gap:0.8rem; }
        .logo-icon { font-size:2rem; }
        .logo h1 { font-family:'Playfair Display',serif; font-size:1.6rem; color:var(--primary); }
        .logo span { display:block; font-size:0.7rem; color:var(--text-light); letter-spacing:2px; text-transform:uppercase; font-weight:500; }
        
        .nav-links { display:flex; gap:0.3rem; flex-wrap:wrap; align-items:center; }
        .nav-links a { 
            display:flex; align-items:center; gap:0.5rem;
            color:var(--text); font-weight:500; padding:0.6rem 1.2rem; 
            transition:var(--transition); 
            border-radius:999px;
            font-size:0.9rem;
        }
        .nav-links a i { font-size:1rem; opacity:0.6; transition:var(--transition); }
        .nav-links a:hover, .nav-links a.active { 
            background:linear-gradient(135deg, var(--primary-light), var(--primary)); 
            color:#fff;
            box-shadow:0 8px 25px rgba(191,90,39,0.3);
            transform:translateY(-2px);
        }
        .nav-links a .nav-badge {
            background:#e74c3c;
            color:#fff;
            font-size:0.6rem;
            padding:0.1rem 0.5rem;
            border-radius:999px;
            margin-left:0.2rem;
        }
        .nav-right { display:flex; align-items:center; gap:0.5rem; }

        .auth-buttons { display:flex; gap:0.6rem; flex-wrap:wrap; }
        .btn { 
            border:none; border-radius:999px; padding:0.7rem 1.8rem; 
            cursor:pointer; transition:var(--transition); font-weight:600; font-size:0.9rem;
            display:inline-flex; align-items:center; gap:0.5rem;
        }
        .btn-primary { background:linear-gradient(135deg, var(--primary-light), var(--primary)); color:#fff; box-shadow:0 8px 25px rgba(191,90,39,0.3); }
        .btn-primary:hover { transform:translateY(-3px); box-shadow:0 12px 35px rgba(191,90,39,0.4); }
        .btn-secondary { background:rgba(191,90,39,0.1); color:var(--primary); }
        .btn-secondary:hover { background:rgba(191,90,39,0.2); transform:translateY(-2px); }
        .btn-outline { background:transparent; border:2px solid var(--primary-light); color:var(--primary); }
        .btn-outline:hover { background:var(--primary); color:#fff; transform:translateY(-2px); }
        .btn-success { background:linear-gradient(135deg,#27ae60,#2ecc71); color:#fff; }
        .btn-danger { background:linear-gradient(135deg,#e74c3c,#c0392b); color:#fff; }
        .btn-gold { background:linear-gradient(135deg,#f1c40f,#f39c12); color:#fff; }
        .btn-admin-login { background:linear-gradient(135deg,#2c3e50,#34495e); color:#fff; }
        .btn-member-login { background:linear-gradient(135deg, var(--primary-light), var(--primary)); color:#fff; }
        .btn-sm { padding:0.3rem 1rem; font-size:0.8rem; }
        .btn-status { padding:0.2rem 0.8rem; font-size:0.7rem; border-radius:999px; border:none; cursor:pointer; font-weight:600; transition:var(--transition); }
        .btn-status:hover { transform:scale(1.05); }
        .btn-status-shipping { background:#3498db; color:#fff; }
        .btn-status-done { background:#27ae60; color:#fff; }
        .btn-status-pending { background:#f39c12; color:#fff; }
        .btn:hover { transform:translateY(-3px); }

        .user-greeting { display:flex; align-items:center; gap:1rem; flex-wrap:wrap; }
        .user-avatar {
            width:40px; height:40px; border-radius:50%;
            background:linear-gradient(135deg, var(--primary-light), var(--primary));
            display:flex; align-items:center; justify-content:center;
            color:#fff; font-weight:700; font-size:1.1rem;
            cursor:pointer;
            transition:var(--transition);
        }
        .user-avatar:hover { transform:scale(1.05); }

        .container { max-width:1280px; margin:0 auto; padding:2rem 2.5rem; }

        .banner { 
            background:linear-gradient(135deg,#fff5ea,#ffd0a0); 
            border-radius:var(--radius); 
            padding:3rem; 
            display:grid; 
            grid-template-columns:1.4fr 1fr; 
            gap:2.5rem; 
            align-items:center; 
            margin-bottom:2.5rem;
            position:relative;
            overflow:hidden;
        }
        .banner::before {
            content:'';
            position:absolute;
            top:-50%;
            right:-20%;
            width:60%;
            height:200%;
            background:radial-gradient(circle, rgba(191,90,39,0.05) 0%, transparent 70%);
            pointer-events:none;
        }
        .banner h2 { font-family:'Playfair Display',serif; font-size:2.8rem; color:var(--primary-dark); margin-bottom:0.8rem; }
        .banner p { color:var(--text-light); margin-bottom:1.5rem; font-size:1.1rem; }
        .banner img { width:100%; border-radius:var(--radius); object-fit:cover; box-shadow:0 20px 50px rgba(191,90,39,0.2); transition:var(--transition); }
        .banner img:hover { transform:scale(1.02); }

        .produk-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:2rem; }
        .card-produk { 
            background:#fff; border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow); transition:var(--transition);
            position:relative;
        }
        .card-produk:hover { transform:translateY(-10px); box-shadow:var(--shadow-hover); }
        .card-produk .card-badge {
            position:absolute; top:1rem; right:1rem;
            background:linear-gradient(135deg, #f1c40f, #f39c12);
            color:#fff; padding:0.3rem 1rem; border-radius:999px; font-size:0.7rem; font-weight:700; z-index:2;
        }
        .card-img { height:220px; display:flex; align-items:center; justify-content:center; background:#fff5ea; overflow:hidden; }
        .card-img img { width:100%; height:100%; object-fit:cover; transition:var(--transition); }
        .card-produk:hover .card-img img { transform:scale(1.05); }
        .card-info { padding:1.5rem; }
        .card-info h3 { font-family:'Playfair Display',serif; margin-bottom:0.3rem; color:var(--text); font-size:1.2rem; }
        .harga { color:var(--primary); font-weight:800; font-size:1.3rem; margin-bottom:0.5rem; }
        .desc-singkat { color:var(--text-light); font-size:0.85rem; min-height:45px; }
        .btn-group { margin-top:1.2rem; display:flex; gap:0.6rem; }
        .btn-detail, .btn-wa { 
            flex:1; border:none; border-radius:999px; padding:0.7rem; cursor:pointer; font-weight:600; font-size:0.85rem;
            transition:var(--transition); display:flex; align-items:center; justify-content:center; gap:0.5rem;
        }
        .btn-detail { background:#f4dfcf; color:var(--primary-dark); }
        .btn-detail:hover { background:var(--primary-light); color:#fff; }
        .btn-wa { background:#25d366; color:#fff; }
        .btn-wa:hover { background:#1da851; transform:scale(1.02); }

        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); backdrop-filter:blur(10px); justify-content:center; align-items:center; padding:1rem; overflow-y:auto; z-index:2000; }
        .modal.show { display:flex; }
        .modal-content { width:100%; max-width:550px; max-height:85vh; background:#fff; border-radius:var(--radius); padding:2rem; position:relative; overflow-y:auto; box-shadow:0 40px 80px rgba(0,0,0,0.3); animation:modalIn 0.3s ease; }
        @keyframes modalIn { from { transform:scale(0.9) translateY(20px); opacity:0; } to { transform:scale(1) translateY(0); opacity:1; } }
        .modal-content.large { max-width:700px; }
        .close-modal { position:absolute; right:1.2rem; top:1.2rem; font-size:1.5rem; cursor:pointer; color:var(--text-light); width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; transition:var(--transition); background:rgba(0,0,0,0.05); }
        .close-modal:hover { background:rgba(0,0,0,0.1); transform:rotate(90deg); }

        .login-role-selector { display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin:1.5rem 0; }
        .login-role-btn { padding:1.5rem 1rem; border:2px solid #e8ddd0; border-radius:16px; background:#faf8f6; cursor:pointer; transition:var(--transition); text-align:center; }
        .login-role-btn:hover { border-color:var(--primary-light); background:#fff; transform:translateY(-3px); box-shadow:0 8px 25px rgba(0,0,0,0.06); }
        .login-role-btn.active { border-color:var(--primary); background:rgba(191,90,39,0.05); box-shadow:0 0 0 3px rgba(191,90,39,0.1); }
        .login-role-btn .role-icon { font-size:2.5rem; display:block; margin-bottom:0.5rem; }
        .login-role-btn .role-name { font-weight:700; font-size:1rem; }
        .login-role-btn .role-desc { font-size:0.75rem; color:var(--text-light); margin-top:0.2rem; }

        .info-panel { background:#fff; border-radius:var(--radius); padding:1.5rem; margin-bottom:1.5rem; box-shadow:var(--shadow); border:1px solid rgba(191,90,39,0.06); }
        .info-panel h4 { font-family:'Playfair Display',serif; font-size:1.1rem; color:var(--primary); margin-bottom:1rem; }

        .flex-row { display:flex; flex-wrap:wrap; gap:1rem; justify-content:space-between; align-items:center; }
        .social-divider { width:100%; height:1px; background:linear-gradient(to right, transparent, rgba(191,90,39,0.2), transparent); margin:0.8rem 0; }

        .form-group { margin-bottom:1.2rem; }
        .form-group label { display:block; margin-bottom:0.4rem; color:var(--text-light); font-weight:600; font-size:0.85rem; letter-spacing:0.5px; }
        input, select, textarea { width:100%; border:2px solid #e8ddd0; border-radius:12px; padding:0.9rem 1.2rem; background:#faf8f6; outline:none; transition:var(--transition); font-size:0.95rem; }
        input:focus, select:focus, textarea:focus { border-color:var(--primary-light); box-shadow:0 0 0 4px rgba(216,109,46,0.1); background:#fff; }

        .category-buttons { display:flex; flex-wrap:wrap; gap:0.8rem; margin:1.5rem 0; }
        .cat-btn { border:none; border-radius:999px; padding:0.7rem 1.8rem; background:#f7e4d4; color:var(--text-light); cursor:pointer; font-weight:600; transition:var(--transition); font-size:0.9rem; }
        .cat-btn.active, .cat-btn:hover { background:linear-gradient(135deg, var(--primary-light), var(--primary)); color:#fff; box-shadow:0 8px 25px rgba(191,90,39,0.25); transform:translateY(-2px); }

        #registerMap, #kontakMap { width:100%; height:220px; border-radius:12px; margin-top:0.5rem; z-index:1; }

        .cart-container { background:#fff; border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }
        .cart-header { padding:1.5rem 2rem; background:linear-gradient(135deg, #fff5ea, #ffd0a0); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem; }
        .cart-header h3 { font-family:'Playfair Display',serif; color:var(--primary-dark); font-size:1.3rem; }
        .cart-item { padding:1.2rem 2rem; display:flex; flex-wrap:wrap; justify-content:space-between; align-items:center; gap:1rem; border-bottom:1px solid #f0e8e0; transition:var(--transition); }
        .cart-item:hover { background:#fdf8f4; }
        .cart-item:last-child { border-bottom:none; }
        .cart-item-info { display:flex; align-items:center; gap:1rem; flex:1; }
        .cart-item-info .item-icon { width:50px; height:50px; border-radius:12px; background:linear-gradient(135deg, #fff5ea, #ffd0a0); display:flex; align-items:center; justify-content:center; font-size:1.5rem; }
        .cart-item-info .item-details h4 { font-family:'Playfair Display',serif; font-size:1rem; }
        .cart-item-info .item-details .item-price { color:var(--primary); font-weight:700; font-size:0.9rem; }
        .cart-item-actions { display:flex; align-items:center; gap:0.8rem; }
        .qty-control { display:flex; align-items:center; gap:0.5rem; background:#f5eee8; border-radius:999px; padding:0.2rem; }
        .qty-control button { width:32px; height:32px; border:none; border-radius:50%; background:transparent; color:var(--text); cursor:pointer; font-weight:bold; font-size:1rem; transition:var(--transition); display:flex; align-items:center; justify-content:center; }
        .qty-control button:hover { background:var(--primary-light); color:#fff; }
        .qty-control button:disabled { opacity:0.3; cursor:not-allowed; }
        .qty-control span { min-width:30px; text-align:center; font-weight:600; }
        .cart-total { padding:1.5rem 2rem; background:linear-gradient(135deg, #fff5ea, #ffd0a0); border-radius:0 0 var(--radius) var(--radius); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem; }
        .cart-total .total-label { font-weight:600; color:var(--text-light); }
        .cart-total .total-amount { font-family:'Playfair Display',serif; font-size:1.8rem; color:var(--primary-dark); font-weight:700; }
        .cart-actions { padding:1.2rem 2rem; background:#fff; border-top:1px solid #f0e8e0; display:flex; flex-wrap:wrap; gap:1rem; justify-content:space-between; align-items:center; }

        .social-icons-row { display:flex; flex-wrap:wrap; gap:0.8rem; }
        .social-icon-link { display:inline-flex; align-items:center; gap:0.6rem; padding:0.5rem 1.2rem; border-radius:999px; background:#f8f0e8; transition:var(--transition); font-weight:500; font-size:0.9rem; }
        .social-icon-link:hover { transform:translateY(-3px); box-shadow:0 8px 25px rgba(0,0,0,0.08); }
        .social-icon-link i { font-size:1.2rem; }

        table { width:100%; border-collapse:collapse; }
        th, td { padding:0.8rem; text-align:left; border-bottom:1px solid #f0e8e0; }
        th { color:var(--text-light); font-weight:600; font-size:0.75rem; text-transform:uppercase; letter-spacing:0.5px; }

        .badge { padding:0.25rem 0.8rem; border-radius:999px; font-size:0.7rem; display:inline-block; font-weight:600; letter-spacing:0.3px; }
        .badge-success { background:#d4edda; color:#155724; }
        .badge-warning { background:#fff3cd; color:#856404; }
        .badge-danger { background:#f8d7da; color:#721c24; }
        .badge-info { background:#d1ecf1; color:#0c5460; }
        .badge-admin { background:#2c3e50; color:#fff; }
        .badge-member { background:#3498db; color:#fff; }

        .admin-panel { background:linear-gradient(135deg, #2c3e50, #34495e); color:#ecf0f1; border-radius:var(--radius); padding:2rem; margin:1rem 0; box-shadow:var(--shadow); }
        .admin-panel h3 { font-family:'Playfair Display',serif; color:#f1c40f; margin-bottom:1rem; }

        .wa-float-container { position:fixed; bottom:30px; right:30px; z-index:999; display:flex; flex-direction:column; gap:8px; align-items:center; }
        .wa-float-label { background:#25d366; color:#fff; border-radius:999px; padding:0.3rem 1.2rem; font-size:0.7rem; animation:pulse 2s infinite; font-weight:600; letter-spacing:0.5px; box-shadow:0 4px 15px rgba(37,211,102,0.3); }
        .btn-wa-float { background:linear-gradient(135deg, #25d366, #1da851); color:#fff; border:none; border-radius:50%; width:60px; height:60px; font-size:28px; cursor:pointer; box-shadow:0 8px 30px rgba(37,211,102,0.4); transition:var(--transition); display:flex; align-items:center; justify-content:center; }
        .btn-wa-float:hover { transform:scale(1.1) rotate(-5deg); box-shadow:0 12px 40px rgba(37,211,102,0.5); }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.7; } }

        .action-btn { padding:0.3rem 1rem; border:none; border-radius:999px; cursor:pointer; font-weight:600; font-size:0.8rem; transition:var(--transition); }
        .action-btn:hover { transform:scale(1.05); }
        .action-btn-pay { background:#f39c12; color:#fff; }
        .action-btn-pay:hover { background:#e67e22; }

        .status-buttons { display:flex; gap:0.4rem; flex-wrap:wrap; }

        .profile-card { background:#fff; border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }
        .profile-header { background:linear-gradient(135deg, var(--primary-light), var(--primary-dark)); padding:2rem 2.5rem; color:#fff; display:flex; align-items:center; gap:2rem; flex-wrap:wrap; position:relative; }
        .profile-header::after { content:''; position:absolute; right:0; top:0; width:300px; height:100%; background:radial-gradient(circle at right, rgba(255,255,255,0.1) 0%, transparent 70%); pointer-events:none; }
        .profile-avatar-large { width:100px; height:100px; border-radius:50%; background:rgba(255,255,255,0.2); display:flex; align-items:center; justify-content:center; font-size:3rem; font-weight:700; border:4px solid rgba(255,255,255,0.3); flex-shrink:0; position:relative; z-index:1; }
        .profile-name-section { position:relative; z-index:1; }
        .profile-name-section h2 { font-family:'Playfair Display',serif; font-size:2rem; margin-bottom:0.2rem; }
        .profile-name-section .profile-role-badge { display:inline-block; padding:0.3rem 1.2rem; border-radius:999px; font-size:0.8rem; font-weight:600; background:rgba(255,255,255,0.2); backdrop-filter:blur(10px); }
        .profile-body { padding:2rem 2.5rem; }
        .profile-stats { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:1rem; margin-bottom:2rem; padding-bottom:2rem; border-bottom:2px solid #f0e8e0; }
        .stat-card { background:#faf8f6; border-radius:16px; padding:1.2rem 1.5rem; text-align:center; transition:var(--transition); }
        .stat-card:hover { transform:translateY(-4px); box-shadow:0 8px 25px rgba(0,0,0,0.06); }
        .stat-card .stat-number { font-family:'Playfair Display',serif; font-size:2rem; font-weight:700; color:var(--primary); }
        .stat-card .stat-label { font-size:0.8rem; color:var(--text-light); margin-top:0.2rem; }
        .profile-info-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:1.2rem; margin-bottom:2rem; }
        .profile-info-item { padding:1.2rem 1.5rem; background:#faf8f6; border-radius:16px; border-left:4px solid var(--primary-light); transition:var(--transition); }
        .profile-info-item:hover { background:#f5eee8; }
        .profile-info-item .label { font-size:0.7rem; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-light); font-weight:600; display:flex; align-items:center; gap:0.5rem; }
        .profile-info-item .label i { color:var(--primary-light); width:16px; }
        .profile-info-item .value { font-weight:600; margin-top:0.3rem; color:var(--text); font-size:1.05rem; }
        .profile-actions { display:flex; flex-wrap:wrap; gap:0.8rem; padding-top:1.5rem; border-top:2px solid #f0e8e0; }

        .edit-profile-form { display:none; margin-top:1.5rem; padding:1.5rem; background:#faf8f6; border-radius:16px; border:2px dashed #e8ddd0; }
        .edit-profile-form.active { display:block; animation:modalIn 0.3s ease; }

        .admin-note { background:#fff3cd; border-radius:12px; padding:1rem; margin:1rem 0; border-left:4px solid #f39c12; }
        .admin-note strong { color:#856404; }

        .loading-spinner { display:inline-block; width:20px; height:20px; border:3px solid #f3f3f3; border-top:3px solid var(--primary); border-radius:50%; animation:spin 1s linear infinite; }
        @keyframes spin { 0% { transform:rotate(0deg); } 100% { transform:rotate(360deg); } }

        .sync-status { font-size:0.8rem; padding:0.2rem 0.8rem; border-radius:999px; display:inline-block; }
        .sync-status.success { background:#d4edda; color:#155724; }
        .sync-status.failed { background:#f8d7da; color:#721c24; }
        .sync-status.syncing { background:#fff3cd; color:#856404; }

        .sort-buttons { display:flex; flex-wrap:wrap; gap:0.5rem; margin:1rem 0; }
        .sort-btn { 
            padding:0.4rem 1.2rem; 
            border:2px solid #e8ddd0; 
            border-radius:999px; 
            background:#fff; 
            cursor:pointer; 
            font-weight:600; 
            font-size:0.8rem;
            transition:var(--transition);
            color:var(--text-light);
        }
        .sort-btn:hover { border-color:var(--primary-light); background:#f8f0e8; }
        .sort-btn.active { border-color:var(--primary); background:var(--primary); color:#fff; }
        .sort-btn i { margin-right:0.3rem; }

        .order-stats { display:flex; flex-wrap:wrap; gap:1rem; margin-bottom:1rem; padding:0.8rem; background:#faf8f6; border-radius:12px; }
        .order-stat-item { font-size:0.85rem; }
        .order-stat-item strong { color:var(--primary); }

        .spreadsheet-link {
            display:inline-block;
            padding:0.3rem 0.8rem;
            background:#f0ebe6;
            border-radius:6px;
            font-size:0.7rem;
            color:var(--primary);
            word-break:break-all;
            margin-top:0.2rem;
        }

    async function callGoogleScript(action, data = null, urlType = 'produk') {
        const url = GOOGLE_SCRIPT_URL[urlType];
        if (!url) {
            console.error('URL tidak ditemukan untuk tipe:', urlType);
            return { success: false, error: 'URL tidak ditemukan' };
        }

        try {
            const params = new URLSearchParams({ action });
            const fullUrl = `${url}?${params.toString()}`;
            
            if (data) {
                // POST - menyimpan data ke spreadsheet
                const response = await fetch(fullUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                return { success: true, data: null };
            } else {
                // GET - mengambil data dari spreadsheet
                const response = await fetch(fullUrl);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const result = await response.json();
                return { success: true, data: result };
            }
        } catch (error) {
            console.error('Google Script API Error:', error);
            return { success: false, error: error.message };
        }
    }

        if (currentQty + qty > stock) {
            alert(`Stok tidak mencukupi! Tersisa ${stock - currentQty} ${name}`);
            return false;
        }
        
        if (currentItem) {
            currentItem.qty += qty;
        } else {
            cart.push({id, name, price, qty});
        }
        saveCart();
        render();
        return true;
    }

    function removeFromCart(id) {
        cart = cart.filter(i => i.id !== id);
        saveCart();
        render();
    }

    function updateQty(id, delta) {
        const item = cart.find(i => i.id === id);
        if (!item) return;
        
        const stock = getProductStock(id);
        const newQty = item.qty + delta;
        
        if (newQty < 1) {
            removeFromCart(id);
            return;
        }
        
        if (newQty > stock) {
            alert(`Stok tidak mencukupi! Tersisa ${stock} ${item.name}`);
            return;
        }
        
        item.qty = newQty;
        saveCart();
        render();
    }

    function showUploadModal(orderNumber, total, shippingDate, paymentMethod) {
        const modal = document.getElementById('globalModal');
        const content = document.getElementById('modalDynamicContent');
        content.innerHTML = `
            <span class="close-modal"><i class="fas fa-times"></i></span>
            <h2 style="font-family:'Playfair Display',serif; color:var(--primary-dark);">📤 Upload Bukti Pembayaran</h2>
            <div style="background:#faf8f6; border-radius:12px; padding:1rem; margin:1rem 0;">
                <p><strong>No. Pesanan:</strong> ${orderNumber}</p>
                <p><strong>Jumlah Bayar:</strong> <span style="color:var(--primary); font-weight:700; font-size:1.1rem;">Rp ${total.toLocaleString()}</span></p>
                <p><strong>Tanggal Kirim:</strong> ${shippingDate}</p>
                <p><strong>Metode:</strong> ${paymentMethod}</p>
            </div>
            <div class="form-group">
                <label>Upload Struk/Bukti (max 5MB)</label>
                <input type="file" id="uploadFile" accept="image/*" required>
            </div>
            <div id="uploadFeedback" class="error-msg"></div>
            <button class="btn btn-primary" id="confirmUploadBtn" style="width:100%;"><i class="fas fa-check"></i> Kirim Bukti</button>
        `;
        modal.classList.add('show');
        
        content.querySelector('.close-modal').onclick = () => modal.classList.remove('show');
        
        document.getElementById('confirmUploadBtn').onclick = () => {
            const file = document.getElementById('uploadFile').files[0];
            if (!file) {
                document.getElementById('uploadFeedback').innerText = 'Harap upload bukti pembayaran';
                return;
            }
            if (file.size > 5 * 1024 * 1024) {
                document.getElementById('uploadFeedback').innerText = 'Ukuran file maksimal 5MB';
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const orderIndex = orders.findIndex(o => o.orderNumber === orderNumber);
                if (orderIndex !== -1) {
                    orders[orderIndex].paymentStatus = 'Terbayar';
                    orders[orderIndex].shippingStatus = 'Menunggu';
                    orders[orderIndex].transactionStatus = 'Pending';
                    orders[orderIndex].paymentProof = e.target.result;
                    saveOrders();
                } else {
                    const newOrder = {
                        orderNumber, total,
                        orderDate: new Date().toISOString().slice(0,10),
                        shippingDate: shippingDate,
                        items: cart.map(i => ({name:i.name, qty:i.qty, price:i.price})),
                        paymentStatus: 'Terbayar',
                        shippingStatus: 'Menunggu',
                        transactionStatus: 'Pending',
                        paymentProof: e.target.result,
                        paymentMethod: paymentMethod,
                        received: false,
                        buyerName: currentUser ? currentUser.name : 'Guest'
                    };
                    orders.push(newOrder);
                    saveOrders();
                    cart = [];
                    saveCart();
                }
                modal.classList.remove('show');
                alert('✅ Bukti pembayaran berhasil diupload! Data tersimpan di spreadsheet.');
                render();
            };
            reader.onerror = function() {
                document.getElementById('uploadFeedback').innerText = 'Gagal membaca file, coba lagi';
            };
            reader.readAsDataURL(file);
        };
    }

    function setActiveLink() {
        document.querySelectorAll('.nav-link').forEach(link => {
            link.classList.toggle('active', link.dataset.page === currentPage);
        });
    }

    function render() {
        const main = document.getElementById('mainContent');
        if (!main) return;
        
        const requiresLogin = ['pesanan', 'cart', 'akun'];
        if (requiresLogin.includes(currentPage) && !currentUser) {
            showLoginRequired();
            setActiveLink();
            refreshAuthUI();
            return;
        }
        
        if (currentPage === 'admin') {
            renderAdmin(main);
            setActiveLink();
            refreshAuthUI();
            return;
        }
        
        switch(currentPage) {
            case 'home': renderHome(main); break;
            case 'produk': renderProduk(main); break;
            case 'pesanan': renderPesanan(main); break;
            case 'cart': renderCart(main); break;
            case 'akun': renderAkun(main); break;
            case 'pembayaran': renderPembayaran(main); break;
            case 'kontak': renderKontak(main); break;
            default: renderHome(main);
        }
        
        setActiveLink();
        refreshAuthUI();
    }

    // ============================================================
    // 16. INITIALIZATION
    // ============================================================
    document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                currentPage = this.dataset.page;
                render();
            });
        });
        
        document.getElementById('loginBtn').addEventListener('click', showLoginForm);
        document.getElementById('registerBtn').addEventListener('click', showRegisterForm);
        
        document.getElementById('waFloatBtn').addEventListener('click', function() {
            openWhatsApp('6281229523837', 'Halo Dapur Roti Mama, saya ingin bertanya tentang produk Anda.');
        });
        
        // Inisialisasi admin default
        const existing = JSON.parse(localStorage.getItem('dapurUser') || 'null');
        if (!existing || existing.name !== ADMIN_CREDENTIALS.username) {
            const adminUser = {
                name: ADMIN_CREDENTIALS.username,
                wa: '081229523837',
                password: ADMIN_CREDENTIALS.password,
                address: 'Kartasura, Sukoharjo',
                kabupaten: 'Sukoharjo',
                kecamatan: 'Kartasura',
                desa: 'Gonilan',
                role: 'admin',
                joinDate: new Date().toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' })
            };
            localStorage.setItem('dapurUser', JSON.stringify(adminUser));
            saveMemberToSpreadsheet(adminUser);
        }
        
        loadData();
        render();
    });
</script>
